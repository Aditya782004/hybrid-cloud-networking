# Bind only to bridge interface
interface=br-vm
bind-interfaces

# Disable DNS (only DHCP)
port=0

# DHCP range
dhcp-range=10.10.0.50,10.10.0.200,255.255.255.0,24h

# Default gateway (bridge IP)
dhcp-option=3,10.10.0.1

# Lease persistence
dhcp-leasefile=/var/lib/dnsmasq/br-vm.leases

# Authoritative DHCP
dhcp-authoritative
